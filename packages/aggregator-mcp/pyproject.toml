[project]
name = "aggregator-mcp"
version = "0.1.0"
description = "MCP server exposing the personal aggregator over the Model Context Protocol"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
    "mcp>=1.0",
]

[project.scripts]
aggregator-mcp = "aggregator_mcp.__main__:main"

[tool.uv.sources]
aggregator-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_mcp"]
