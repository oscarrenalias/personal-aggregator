[project]
name = "aggregator-retriever"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
    "feedparser>=6",
    "httpx>=0.27",
]

[project.scripts]
aggregator-retriever = "aggregator_retriever.loop:run"

[tool.uv.sources]
aggregator-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_retriever"]
