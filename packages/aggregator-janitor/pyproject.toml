[project]
name = "aggregator-janitor"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
]

[project.scripts]
aggregator-janitor = "aggregator_janitor.__main__:main"

[tool.uv.sources]
aggregator-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_janitor"]
