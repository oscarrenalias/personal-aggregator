[project]
name = "aggregator-common"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "sqlalchemy>=2",
    "alembic",
    "psycopg[binary]",
    "pydantic-settings",
    "python-dotenv",
    "litellm",
]

[project.scripts]
aggregator-migrate = "aggregator_common.migrate:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_common"]
