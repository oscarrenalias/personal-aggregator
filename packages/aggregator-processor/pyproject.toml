[project]
name = "aggregator-processor"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
    "trafilatura>=1",
    "readability-lxml>=0.8",
]

[project.scripts]
aggregator-processor = "aggregator_processor.main:main"

[tool.uv.sources]
aggregator-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_processor"]
