[project]
name = "aggregator-tui"
version = "0.1.0"
description = "Terminal UI reader client for the personal aggregator JSON API"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "httpx>=0.27",
    "textual>=0.80",
]

[project.urls]
Homepage = "https://github.com/oscarrenalias/personal-aggregator"
Repository = "https://github.com/oscarrenalias/personal-aggregator"

[project.scripts]
aggregator-tui = "aggregator_tui.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_tui"]
