{#
  _brief_card.html — Single brief card for the Today list pane.
  Context:
    brief : Brief ORM object
#}
<article class="brief-card"
         data-brief-id="{{ brief.id }}"
         :class="{ 'is-selected': selectedId === {{ brief.id }} }"
         @click="selectBrief({{ brief.id }})"
         tabindex="0"
         @keydown.enter="selectBrief({{ brief.id }})">
  <h2 class="brief-card-title">{{ brief.headline or "Daily Brief" }}</h2>
  <div class="brief-card-meta">
    <time class="brief-card-date" datetime="{{ brief.period_start.isoformat() }}">
      {{ format_brief_date(brief.period_start) }}
    </time>
    <span class="brief-card-count">{{ brief.topics | length }} topic{{ 's' if brief.topics | length != 1 else '' }}</span>
  </div>
</article>
