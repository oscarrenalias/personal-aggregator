[project]
name = "aggregator-web"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
]

[project.scripts]
aggregator-web = "aggregator_web.main:main"

[tool.uv.sources]
aggregator-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_web"]
