[project]
name = "aggregator-web"
version = "0.1.0"
description = "FastAPI + HTMX + Alpine.js PWA web UI for the personal aggregator"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
    "fastapi>=0.110",
    "uvicorn[standard]>=0.29",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
]

[project.scripts]
aggregator-web = "aggregator_web.__main__:main"

[tool.uv.sources]
aggregator-common = { workspace = true }

[dependency-groups]
dev = ["httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_web"]
