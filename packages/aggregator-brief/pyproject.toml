[project]
name = "aggregator-brief"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "aggregator-common",
    "litellm>=1",
    "pydantic>=2",
]

[project.scripts]
aggregator-brief = "aggregator_brief.__main__:main"

[tool.uv.sources]
aggregator-common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aggregator_brief"]
