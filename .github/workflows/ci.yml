name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'pyproject.toml'
      - 'packages/**/Dockerfile'
      - 'docker-compose.prod.yml'
      - 'scripts/**'
      - 'deploy/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: bash scripts/run-tests.sh

  build:
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.read_version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        run: uv version --bump ${{ inputs.bump || 'patch' }}

      - name: Read version
        id: read_version
        run: |
          VERSION="v$(uv version --short)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git add pyproject.toml uv.lock
          git commit -m "chore: bump version to ${{ steps.read_version.outputs.version }} [skip ci]"
          git pull --rebase origin main
          git push origin main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        env:
          VERSION: ${{ steps.read_version.outputs.version }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          for SERVICE in retriever processor summarize-rank clusterer admin web brief mcp janitor; do
            docker buildx build \
              --platform linux/arm64 \
              --build-arg APP_VERSION="${VERSION}" \
              --push \
              -t "ghcr.io/oscarrenalias/personal-aggregator/aggregator-${SERVICE}:${VERSION}" \
              -t "ghcr.io/oscarrenalias/personal-aggregator/aggregator-${SERVICE}:latest" \
              -t "ghcr.io/oscarrenalias/personal-aggregator/aggregator-${SERVICE}:main-${SHORT_SHA}" \
              -f "packages/aggregator-${SERVICE}/Dockerfile" \
              .
          done

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build version-matched TUI wheel
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # Match the standalone TUI package version to the release tag (without
          # the leading 'v'). Done ephemerally here — the committed pyproject
          # version stays at its dev value and is never bumped per release.
          sed -i "s/^version = .*/version = \"${VERSION#v}\"/" packages/aggregator-tui/pyproject.toml
          uv build --package aggregator-tui --out-dir dist

      - name: Generate OpenAPI spec
        env:
          # Importing the app constructs Settings, which requires DATABASE_URL.
          # OpenAPI generation never connects (create_engine is lazy), so a
          # placeholder DSN is enough to build the schema.
          DATABASE_URL: postgresql://placeholder@localhost/aggregator
        run: |
          # Regenerate fresh from the code so the released contract can never
          # drift from what the API actually serves.
          uv run --package aggregator-api python -c \
            "import json; from aggregator_api.app import app; open('dist/openapi.json','w').write(json.dumps(app.openapi(), indent=2))"

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build.outputs.version }}"
          # GitHub release assets cannot start with a dot, so publish the env
          # template as env.example (install.sh accepts this name).
          cp .env.example env.example
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --generate-notes \
            docker-compose.prod.yml \
            deploy/aggregator.service \
            deploy/install.sh \
            deploy/bootstrap.sh \
            deploy/aggregator \
            env.example \
            dist/aggregator_tui-*.whl \
            dist/aggregator_tui-*.tar.gz \
            dist/openapi.json
