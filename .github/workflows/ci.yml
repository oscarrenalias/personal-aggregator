name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'pyproject.toml'
      - 'packages/**/Dockerfile'
      - 'docker-compose.prod.yml'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Run tests
        run: bash scripts/run-tests.sh
