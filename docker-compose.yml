services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator
      POSTGRES_DB: aggregator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator -d aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    build:
      context: .
      dockerfile: packages/aggregator-admin/Dockerfile
    image: personal-aggregator/aggregator-admin:dev
    entrypoint: ["aggregator-migrate"]
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  retriever:
    build:
      context: .
      dockerfile: packages/aggregator-retriever/Dockerfile
    image: personal-aggregator/aggregator-retriever:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  processor:
    build:
      context: .
      dockerfile: packages/aggregator-processor/Dockerfile
    image: personal-aggregator/aggregator-processor:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  summarize-rank:
    build:
      context: .
      dockerfile: packages/aggregator-summarize-rank/Dockerfile
    image: personal-aggregator/aggregator-summarize-rank:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  clusterer:
    build:
      context: .
      dockerfile: packages/aggregator-clusterer/Dockerfile
    image: personal-aggregator/aggregator-clusterer:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
      # Dev-only: use the cheaper model to minimize token cost (overrides .env;
      # set here rather than repo-root .env, which the test suite reads).
      CLUSTERER_LLM_MODEL: gpt-4.1-mini
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      summarize-rank:
        condition: service_started
    restart: unless-stopped

  brief:
    build:
      context: .
      dockerfile: packages/aggregator-brief/Dockerfile
    image: personal-aggregator/aggregator-brief:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
      # Dev-only: use the cheaper model to minimize token cost (overrides .env;
      # set here rather than repo-root .env, which the test suite reads).
      BRIEF_LLM_MODEL: gpt-4.1-mini
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: packages/aggregator-web/Dockerfile
    image: personal-aggregator/aggregator-web:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
      WEB_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${WEB_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: packages/aggregator-mcp/Dockerfile
    image: personal-aggregator/aggregator-mcp:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
      MCP_HOST: 0.0.0.0
    ports:
      - "127.0.0.1:${MCP_PORT:-8765}:8765"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  janitor:
    build:
      context: .
      dockerfile: packages/aggregator-janitor/Dockerfile
    image: personal-aggregator/aggregator-janitor:dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
