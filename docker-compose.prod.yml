services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator
      POSTGRES_DB: aggregator
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator -d aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  migrate:
    image: ${IMAGE_PREFIX:-personal-aggregator}/aggregator-admin:${APP_VERSION:-dev}
    entrypoint: ["aggregator-migrate"]
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # On-demand admin CLI. Not started by `up` (cli profile); invoked via the
  # `aggregator` wrapper script: `docker compose run --rm admin <args>`.
  admin:
    image: ${IMAGE_PREFIX:-personal-aggregator}/aggregator-admin:${APP_VERSION:-dev}
    profiles: ["cli"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    restart: "no"

  retriever:
    image: ${IMAGE_PREFIX:-personal-aggregator}/aggregator-retriever:${APP_VERSION:-dev}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  processor:
    image: ${IMAGE_PREFIX:-personal-aggregator}/aggregator-processor:${APP_VERSION:-dev}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  summarize-rank:
    image: ${IMAGE_PREFIX:-personal-aggregator}/aggregator-summarize-rank:${APP_VERSION:-dev}
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    image: ${IMAGE_PREFIX:-personal-aggregator}/aggregator-web:${APP_VERSION:-dev}
    env_file: .env
    environment:
      # Reach Postgres by its compose service name (matches the other services).
      # Without this, web would inherit .env's localhost DATABASE_URL and fail to
      # connect from inside the container.
      DATABASE_URL: postgresql://aggregator:aggregator@postgres:5432/aggregator
      # The container must listen on all interfaces so Docker's published port can
      # reach uvicorn. The host-side exposure is controlled by WEB_BIND below, not here.
      WEB_HOST: 0.0.0.0
    ports:
      # WEB_BIND controls which host interface the UI is exposed on:
      #   0.0.0.0   → reachable from any device on your LAN (default)
      #   127.0.0.1 → Pi-local only (e.g. behind Tailscale)
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  pgdata:
